<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eng Maher Links</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* 🔥 الخلفية المختارة (Black + Red Corner Glow) */
body{
    height:100vh;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left, rgba(255,0,0,.18), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,0,0,.12), transparent 45%),
    #000;
}
/* Glow خفيف */
body::before{
    content:'';
    position:absolute;
    width:600px;
    height:600px;
    background:rgba(255,0,0,.12);
    border-radius:50%;
    filter:blur(200px);
    top:-220px;
    left:-220px;
}

body::after{
    content:'';
    position:absolute;
    width:500px;
    height:500px;
    background:rgba(255,0,0,.08);
    border-radius:50%;
    filter:blur(200px);
    bottom:-220px;
    right:-220px;
}

/* 🔥 الكارد */

.card{

    width:420px;
    max-height:90vh;   /* مهم جدًا */

    overflow-y:auto;   /* ⬅️ ده اللي بيخلي السحب جوه الكارد */
    overflow-x:hidden;

    -webkit-overflow-scrolling:touch; /* سحب ناعم على الموبايل */
    scrollbar-width:none; /* Firefox */
    -ms-overflow-style:none; /* Edge القديم */

    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(25px);

    border-radius:35px;

    padding:25px 35px;

    text-align:center;

    position:relative;
    z-index:2;

    border:2px solid rgba(255,0,0,.4);

    box-shadow:
    0 0 20px rgba(255,0,0,.25),
    0 0 60px rgba(0,0,0,.7);
}
/* 🔥 الصورة */
.profile{

    width:280px;
    height:280px;

    margin:20px auto 10px auto;

    border-radius:50%; /* ⬅️ دايرة */

    overflow:hidden;

    border:3px solid red;

    box-shadow:
    0 0 25px red,
    0 0 60px rgba(255,0,0,.4);

    display:flex;
    justify-content:center;
    align-items:center;

}

.profile img{

    width:100%;
    height:100%;

    object-fit:cover;

    object-position:center;

}
/* 🔥 الاسم */
.logo{

    margin-top:25px;

    font-size:50px;
    font-weight:900;

    letter-spacing:2px;

    /* نخلي "Eng" أبيض واضح و "Maher" أحمر */
    color:white;

    text-shadow:
    0 0 10px rgba(255,0,0,.25);

}

/* نخلي جزء Maher أحمر لوحده */
.logo span{
    color:red;
    text-shadow:
    0 0 15px red,
    0 0 30px rgba(255,0,0,.4);
}
/* الوصف */
.desc{

    color:#bbb;

    margin-top:10px;
    margin-bottom:30px;

    font-size:14px;
}

/* 🔥 الأزرار */
.links{

    display:flex;
    flex-direction:column;
    gap:18px;
}

.links a{

    text-decoration:none;
    color:white;

    padding:16px;

    border-radius:18px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,0,0,.25);

    font-weight:600;

    transition:.3s;

    position:relative;
    overflow:hidden;
}

.links a::before{

    content:'';

    position:absolute;

    top:0;
    left:-100%;

    width:100%;
    height:100%;

    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,0,0,.3),
        transparent
    );

    transition:.5s;
}

.links a:hover::before{
    left:100%;
}

.links a:hover{

    transform:translateY(-4px);

    background:red;

    box-shadow:0 0 20px red;
}

/* الفوتر */
.footer{

    margin-top:25px;

    font-size:12px;

    color:#777;
}

.red{
    color:red;
}

</style>

</head>

<body>

<div class="card">

    <div class="profile">
        <img src="1.jpg">
    </div>

    <h1 class="logo">
        Eng Maher
    </h1>

    <p class="desc">
        Welcome To My Social Links
    </p>

    <div class="links">
        <a href="https://www.facebook.com/maher.mohamed.914431" target="_blank"><i class="fab fa-facebook"></i> Facebook</a>
        <a href="https://www.instagram.com/maher_ua07" target="_blank"><i class="fab fa-instagram"></i> Instagram</a>
        <a href="https://www.tiktok.com/@maher_ua07" target="_blank"><i class="fab fa-tiktok"></i> TikTok</a>
        <a href="https://wa.me/201069845776" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
    </div>


    <div class="footer">
        Designed By <span class="red"> Eng Maher</span>
    </div>

</div>

</body>
</html>

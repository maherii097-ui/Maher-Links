
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="صفحة روابطي الاجتماعية - تابع Eng Maher على جميع المنصات">

<title>Eng Maher Links</title>
<link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23ff0000'/><text x='50' y='60' font-size='70' font-weight='bold' text-anchor='middle' fill='white'>M</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;

    -webkit-tap-highlight-color:transparent;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes glow {
    0%, 100% { box-shadow: 0 0 20px rgba(255,0,0,.5); }
    50% { box-shadow: 0 0 30px rgba(255,0,0,.8); }
}

/* 🔥 قفل الصفحة */
html, body{
    min-height:100%;
    width:100%;
    margin:0;
    overflow-x:hidden;
    overflow-y:auto;
    overscroll-behavior-x:none;
    overscroll-behavior-y:auto;
}

/* الخلفية */
body{
    min-height:100vh;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top left, rgba(255,0,0,.18), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,0,0,.12), transparent 45%),
    #000;
}

/* Glow خفيف */
body::before{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,0,0,.08);
    border-radius:50%;
    filter:blur(150px);
    top:-200px;
    left:-200px;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,0,0,.06);
    border-radius:50%;
    filter:blur(150px);
    bottom:-200px;
    right:-200px;
}

/* 🔥 الكارد (أسرع) */
.card{

    width:90%;
    max-width:420px;
    max-height:90vh;

    overflow-y:auto;
    overflow-x:hidden;

    -webkit-overflow-scrolling:touch;

    scrollbar-width:none;
    -ms-overflow-style:none;

    background:rgba(255,255,255,0.04);

    backdrop-filter:blur(10px);

    border-radius:35px;

    padding:25px 35px;

    text-align:center;

    position:relative;

    border:2px solid rgba(255,0,0,.4);

    will-change:transform;
    
    animation: slideUp 0.6s ease-out;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
img, video, svg, iframe {
    max-width: 100%;
    display: block;
}

.links a {
    min-width: 0;
}
@media (max-width:480px){
    .card{
        width:95%;
        padding:20px 25px;
        border-radius:25px;
    }
}

.card::-webkit-scrollbar{
    display:none;
}

/* الصورة (أخف) */
.profile{

    width:280px;
    height:280px;

    margin:20px auto 10px auto;

    border-radius:50%;

    overflow:hidden;

    border:3px solid red;

    box-shadow:0 0 20px red;

    display:flex;
    justify-content:center;
    align-items:center;
    
    animation: slideUp 0.6s ease-out 0.1s both, glow 3s ease-in-out infinite;
}

@media (max-width:480px){
    .profile{
        width:220px;
        height:220px;
    }
}

.profile img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
}

/* الاسم */
.logo{

    margin-top:25px;

    font-size:50px;
    font-weight:900;

    letter-spacing:2px;

    color:white;

    text-shadow:0 0 10px rgba(255,0,0,.25);
    
    animation: slideUp 0.6s ease-out 0.2s both;
}

@media (max-width:480px){
    .logo{
        font-size:38px;
    }
}

.logo span{
    color:red;
    text-shadow:0 0 15px red;
}

/* الوصف */
.desc{
    color:#bbb;
    margin-top:10px;
    margin-bottom:30px;
    font-size:14px;
    
    animation: slideUp 0.6s ease-out 0.3s both;
    height: 20px;
}

/* الروابط */
.links{
    display:flex;
    flex-direction:column;
    gap:18px;
    
    animation: slideUp 0.6s ease-out 0.4s both;
}

.links a{

    text-decoration:none;
    color:white;

    padding:16px;

    border-radius:18px;

    background:rgba(255,255,255,0.04);

    border:1px solid rgba(255,0,0,.25);

    font-weight:600;

    transition:0.15s ease;

    position:relative;
    overflow:hidden;
    
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
}

.links a i {
    font-size: 18px;
    transition: 0.3s ease;
}

.links a::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,0,0,.3),
        transparent
    );
    transition:.4s;
}

.links a:hover::before{
    left:100%;
}

.links a:hover{

    transform:translateY(-2px);

    background:red;

    box-shadow:0 0 10px red;
}

.links a:hover i {
    transform: scale(1.2) rotate(10deg);
}

/* الفوتر */
.footer{
    margin-top:25px;
    font-size:12px;
    color:#777;
    
    animation: slideUp 0.6s ease-out 0.5s both;
}

.red{
    color:red;
}

</style>

</head>

<body>

<div class="card">

    <div class="profile">
        <img src="1.jpg" alt="صورة Eng Maher">
    </div>

    <h1 class="logo">
        Eng <span>Maherr</span>
    </h1>

    <p class="desc" id="typewriter"></p>

    <div class="links">
        <a href="https://www.facebook.com/maher.mohamed.914431" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-facebook-f"></i>
            Facebook
        </a>
        <a href="https://www.instagram.com/maher_ua07" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-instagram"></i>
            Instagram
        </a>
        <a href="https://www.tiktok.com/@maher_ua07" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-tiktok"></i>
            TikTok
        </a>
        <a href="https://wa.me/201069845776" target="_blank" rel="noopener noreferrer">
            <i class="fab fa-whatsapp"></i>
            WhatsApp
        </a>
    </div>

    <div class="footer">
        Designed By <span class="red">Eng Maher</span>
    </div>

</div>

<script>
    // Typing Animation
    const text = "Welcome To My Social Links";
    const typewriterElement = document.getElementById('typewriter');
    let index = 0;

    function typeWriter() {
        if (index < text.length) {
            typewriterElement.textContent += text.charAt(index);
            index++;
            setTimeout(typeWriter, 50);
        }
    }

    // Click Counter
    let clicks = localStorage.getItem('clicks') || 0;
    const links = document.querySelectorAll('.links a');
    
    links.forEach(link => {
        link.addEventListener('click', () => {
            clicks = parseInt(clicks) + 1;
            localStorage.setItem('clicks', clicks);
        });
    });

    // Start Typing Animation
    typeWriter();
</script>

</body>
</html>
